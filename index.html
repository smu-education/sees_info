<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 프로그램 일정 안내</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s ease; }
        /* 강조 테두리 효과 복구 */
        .current-session-ring { box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="p-4 md:p-8 pt-20 md:pt-8"> <!-- 모바일 겹침 방지를 위해 위쪽 여백(pt-20) 추가 -->

    <!-- ========================================== -->
    <!-- 전단계(메인)로 돌아가는 버튼 위치 수정 완료! -->
    <!-- ========================================== -->
    <a href="https://smu-education.github.io/2026-study-lecture/" class="fixed top-4 left-4 md:top-6 md:left-6 z-50 flex items-center gap-2 px-4 py-2 bg-white/90 backdrop-blur-md rounded-full text-slate-700 text-sm font-bold border border-slate-200 hover:bg-white hover:-translate-x-1 transition-all shadow-md">
        <i class="fa-solid fa-arrow-left"></i> 혁신원 메인으로
    </a>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="gradient-bg text-white p-8 rounded-3xl shadow-xl mb-12 text-center">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">2026 세명교육력증진세미나(SEES)</h1>
            <p class="text-blue-100 opacity-90 font-medium tracking-wide">Semyung Education Enhancement Seminar</p>
        </header>

        <!-- Filter/Stats -->
        <div class="flex flex-wrap justify-between items-center mb-8 gap-4">
            <div class="flex space-x-2">
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-3 py-1 rounded-full border border-blue-200">전체 10회차</span>
                <span class="bg-green-100 text-green-800 text-xs font-semibold px-3 py-1 rounded-full border border-green-200">AI 역량 강화</span>
                <span class="bg-blue-600 text-white text-xs font-semibold px-3 py-1 rounded-full border border-blue-700 animate-pulse">2회 진행 예정</span>
            </div>
            <div class="text-gray-500 text-sm italic">* 센터 상황에 따라 주제 및 일정이 변경될 수 있습니다.</div>
        </div>

        <!-- Timeline/Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="program-container">
            <!-- Cards will be injected here by JavaScript -->
        </div>
    </div>

    <script>
        const programs = [
            {
                id: "1회", date: "4월 7일", 
                category: "교육기획 / 교육실천", 
                subCategory: "AI 기반 교수설계 기획, AI 기반 수업 구현",
                topic: "[AI 역량 강화] 생성형 AI를 활용한 수업 설계",
                speaker: "장은정 교수", institution: "동덕여자대학교",
                type: "온라인", typeClass: "bg-purple-100 text-purple-700"
            },
            {
                id: "2회", date: "5월 7일", 
                category: "교수학습환경이해", 
                subCategory: "AI 윤리, AI 리터러시",
                topic: "[AI 역량 강화] AI 시대의 교육과 윤리",
                speaker: "신지은 교수", institution: "세종대학교",
                type: "온라인", typeClass: "bg-purple-100 text-purple-700",
                isCurrent: true 
            },
            {
                id: "3회", date: "6월", 
                category: "교육개발", 
                subCategory: "SMU 교수역량 강화",
                topic: "MZ 세대 학습자를 위한 공감 중심 강의",
                speaker: "백명 대표", institution: "명코칭",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "4회", date: "7월", 
                category: "교육성찰", 
                subCategory: "SMU 교수역량 강화",
                topic: "수업 성찰을 위한 티칭 포트폴리오 개발 및 활용",
                speaker: "조용개 교수", institution: "경남대학교",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "5회", date: "8월", 
                category: "교육기획 / 교육개발", 
                subCategory: "AI 도구 활용, AI 실습 기반 수업 적용",
                topic: "[AI 역량 강화] AI 도구 실전 적용·실습",
                speaker: "이광희 대표", institution: "더 피처 피티",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "6회", date: "9월", 
                category: "교육실천", 
                subCategory: "AI 기반 교수설계 기획, AI 기반 수업 구현",
                topic: "[AI 역량 강화] 생성형 AI를 활용한 게이미피케이션 교수설계",
                speaker: "최정빈 교수", institution: "추계예술대학교",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "7회", date: "10월", 
                category: "교육개발", 
                subCategory: "AI 윤리, AI 리터러시",
                topic: "[AI 역량 강화] AI 윤리 및 리터러시 교육",
                speaker: "홍영일 대표", institution: "재미와의미연구소",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "8회", date: "11월", 
                category: "교수학습환경이해", 
                subCategory: "SMU 교수역량 강화",
                topic: "요즘 학생들과 통하는 법",
                speaker: "장한별 대표", institution: "웜스피치",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "9회", date: "12월", 
                category: "교육실천", 
                subCategory: "FUN 교수법 - 팀기반학습(TBL)",
                topic: "온·오프라인 팀학습 어떻게 할까?",
                speaker: "박수정 교수", institution: "충남대학교",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            },
            {
                id: "10회", date: "27년 1월", 
                category: "교육기획 / 교육개발", 
                subCategory: "AI 활용 교육과정 개발, AI 기반 수업 운영",
                topic: "[AI 역량 강화] AI 활용 교육과정 개발 및 수업운영",
                speaker: "정주영 교수", institution: "고신대학교",
                type: "혼합", typeClass: "bg-orange-100 text-orange-700"
            }
        ];

        const container = document.getElementById('program-container');

        programs.forEach(program => {
            const isAI = program.topic.includes('[AI 역량 강화]');
            const isCurrent = program.isCurrent === true;
            
            const card = `
                <div class="bg-white rounded-2xl shadow-sm p-6 card-hover flex flex-col justify-between relative overflow-hidden 
                    ${isCurrent ? 'border-2 border-blue-500 current-session-ring shadow-lg' : 'border border-gray-100'}">
                    
                    <!-- Status Labels -->
                    <div class="absolute top-0 left-0 flex">
                        ${isCurrent ? '<div class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-br-lg font-bold z-10">진행 예정</div>' : ''}
                    </div>
                    
                    ${isAI ? '<div class="absolute top-0 right-0 bg-blue-500 text-white text-[10px] px-3 py-1 rounded-bl-lg font-bold">AI FOCUS</div>' : ''}
                    
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="${isCurrent ? 'text-blue-700' : 'text-blue-600'} font-bold text-lg">${program.id}</span>
                            <span class="px-2 py-1 rounded text-xs font-bold ${program.typeClass}">${program.type}</span>
                        </div>
                        
                        <div class="flex items-center text-gray-500 text-sm mb-2 font-semibold ${isCurrent ? 'text-blue-600' : ''}">
                            <i class="far fa-calendar-alt mr-2"></i> ${program.date}
                        </div>

                        <h3 class="text-gray-900 font-bold text-lg mb-3 leading-tight ${isCurrent ? 'text-blue-900' : ''}">
                            ${program.topic}
                        </h3>

                        <div class="space-y-1 mb-4">
                            <p class="text-xs text-blue-500 font-medium uppercase tracking-wider">${program.category}</p>
                            <p class="text-xs text-gray-400">${program.subCategory}</p>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-50">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full ${isCurrent ? 'bg-blue-50' : 'bg-gray-100'} flex items-center justify-center mr-3">
                                <i class="fas fa-user-tie ${isCurrent ? 'text-blue-400' : 'text-gray-400'}"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">${program.speaker}</p>
                                <p class="text-xs text-gray-500">${program.institution}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    </script>

</body>
</html>
